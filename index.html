<!DOCTYPE html>
<html>
<head>
  <title>DiNGo Fixed Beta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#111; color:white; text-align:center; font-family:Arial; }
    #grid { width:90vw; max-width:400px; margin:15px auto; display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
    .cell { background:#222; padding:18px 0; border-radius:8px; cursor:pointer; font-size:18px; }
    button,input { padding:10px; margin:5px; border-radius:6px; border:none; }
  </style>
</head>
<body>

<h2>DiNGo Fixed Beta</h2>

<div id="home">
  <button onclick="createRoom()">Create Room</button><br>
  <input type="text" id="roomInput" placeholder="Enter Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="setup" style="display:none;">
  <h3>Arrange Board</h3>
  <div id="grid"></div>
  <button onclick="confirmBoard()">Confirm</button>
</div>

<div id="game" style="display:none;">
  <h3 id="roomText"></h3>
  <div id="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPr1ZTE5450Qv1OhF2S13h12835sodmOw",
  authDomain: "dingo-beta-c280a.firebaseapp.com",
  databaseURL: "https://dingo-beta-c280a-default-rtdb.firebaseio.com",
  projectId: "dingo-beta-c280a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomId="";
let playerId="";
let board=[];
let setupNumber=1;

function generateRoomCode(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

window.createRoom = async function(){
  roomId = generateRoomCode();
  playerId = "player1";

  await set(ref(db,"rooms/"+roomId),{
    boards:{},
    selectedNumbers:[],
    currentTurn:"player1",
    winner:null
  });

  startSetup();
}

window.joinRoom = async function(){
  roomId = document.getElementById("roomInput").value.toUpperCase();
  playerId = "player2";

  const snapshot = await get(ref(db,"rooms/"+roomId));
  if(!snapshot.exists()){
    alert("Room not found!");
    return;
  }

  startSetup();
}

function startSetup(){
  document.getElementById("home").style.display="none";
  document.getElementById("setup").style.display="block";
  board=new Array(25).fill(null);
  setupNumber=1;
  renderSetupGrid();
}

function renderSetupGrid(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  board.forEach((val,i)=>{
    const cell=document.createElement("div");
    cell.classList.add("cell");
    cell.innerText=val?val:"";
    cell.onclick=()=>{
      if(!board[i] && setupNumber<=25){
        board[i]=setupNumber++;
        renderSetupGrid();
      }
    }
    grid.appendChild(cell);
  });
}

window.confirmBoard = async function(){
  if(setupNumber<=25){
    alert("Fill all 25 numbers");
    return;
  }

  await update(ref(db,"rooms/"+roomId+"/boards"),{
    [playerId]:board
  });

  waitForBoth();
}

function waitForBoth(){
  document.getElementById("setup").innerHTML="<h3>Waiting for opponent...</h3>";

  onValue(ref(db,"rooms/"+roomId+"/boards"),snapshot=>{
    const data=snapshot.val();
    if(data && data.player1 && data.player2){
      startGame();
    }
  });
}

function startGame(){
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("roomText").innerText="Room: "+roomId;
}

</script>
</body>
</html>
